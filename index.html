<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わりとどうでもいいジェネレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'DotGothic16', sans-serif;
            color: #a3f7bf;
            text-align: center;
            font-size: 28px;
            line-height: 1.3; /* 2行になったときの行間をきれいに調整 */
            margin-top: 0;
            margin-bottom: 20px;
            cursor: pointer;
            user-select: none;
        }
        label {
            font-size: 14px;
            color: #aaaaaa;
            display: block;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            margin-bottom: 20px;
        }
        textarea:focus {
            outline: none;
            border-color: #a3f7bf;
        }
        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            margin-bottom: 20px;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        button {
            width: 100%;
            background-color: #a3f7bf;
            color: #1e1e1e;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #8ce5a8;
        }
        /* 管理メニューのスタイル */
        #admin-ui {
            background-color: #2d2d2d;
            border: 1px dashed #a3f7bf;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        #admin-ui.hidden {
            display: none;
        }
        .admin-title {
            font-size: 14px;
            font-weight: bold;
            color: #a3f7bf;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .admin-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        #reset-btn {
            background-color: #ff6b6b;
            color: white;
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
        }
        #image-input {
            color: #ccc;
            font-size: 12px;
        }
        #result-wrap {
            margin-top: 20px;
            text-align: center;
        }
        #result-img {
            width: 100%;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- ★タイトル（<br>を入れて2行にしました！ここを5回連続タップすると隠しメニューが出ます） -->
        <h1 id="secret-trigger">わりとどうでもいい<br>ジェネレーター</h1>
        
        <!-- 管理者用メニュー（最初から裏側に仕込んであります） -->
        <div id="admin-ui" class="hidden">
            <p class="admin-title">🛠️ 管理者メニュー</p>
            <input type="file" id="image-input" accept="image/*">
            <div class="admin-buttons">
                <button type="button" id="reset-btn">デフォルトの猫画像に戻す</button>
            </div>
        </div>

        <label for="text-input">文字を入力（改行できます）</label>
        <textarea id="text-input">わりと
どうでも
いい</textarea>

        <label>プレビュー</label>
        <div class="canvas-container">
            <canvas id="preview-canvas"></canvas>
        </div>

        <button id="download-btn">画像をつくる</button>
